<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Çınar Cafe | Dijital Menü</title>
  <style>
    :root{
      --bg:#0b0c10;
      --card:#11131a;
      --text:#f3f4f6;
      --muted:#b9c0cc;
      --line:#242838;
      --accent:#ffd166;
      --accent2:#7bdff2;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
      background: radial-gradient(1200px 800px at 10% -10%, rgba(123,223,242,.25), transparent 60%),
                  radial-gradient(900px 700px at 100% 0%, rgba(255,209,102,.20), transparent 55%),
                  var(--bg);
      color:var(--text);
      line-height:1.35;
    }
    header{
      position:sticky; top:0; z-index:20;
      backdrop-filter: blur(10px);
      background: rgba(11,12,16,.72);
      border-bottom:1px solid rgba(36,40,56,.7);
    }
    .wrap{max-width:920px; margin:0 auto; padding:14px 16px;}
    .brand{display:flex; gap:12px; align-items:center; justify-content:space-between;}
    .brand-left{display:flex; gap:12px; align-items:center;}
    .logo{
      width:42px;height:42px;border-radius:14px;
      background: linear-gradient(135deg, rgba(255,209,102,.95), rgba(123,223,242,.85));
      box-shadow: var(--shadow);
      display:grid; place-items:center; color:#0b0c10; font-weight:800;
    }
    h1{font-size:18px; margin:0;}
    .sub{font-size:12px; color:var(--muted); margin-top:2px;}
    .search{width:100%; margin-top:12px; display:flex; gap:10px; align-items:center;}
    input[type="search"]{
      width:100%;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(36,40,56,.9);
      background: rgba(17,19,26,.9);
      color: var(--text);
      outline:none;
    }
    input[type="search"]::placeholder{color:rgba(185,192,204,.75)}
    .chips{display:flex; flex-wrap:wrap; gap:8px; margin-top:12px;}
    .chip{
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(36,40,56,.9);
      background: rgba(17,19,26,.65);
      color: var(--muted);
      font-size:12px;
      cursor:pointer;
      user-select:none;
    }
    .chip.active{
      border-color: rgba(255,209,102,.9);
      color: var(--text);
      background: rgba(255,209,102,.15);
    }
    main{padding:16px;}
    section{
      margin: 18px 0 22px;
      background: rgba(17,19,26,.75);
      border:1px solid rgba(36,40,56,.8);
      border-radius:18px;
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .sec-head{
      padding:14px 14px 10px;
      border-bottom: 1px solid rgba(36,40,56,.75);
      display:flex; align-items:center; justify-content:space-between; gap:12px;
    }
    .sec-title{font-size:16px; margin:0;}
    .count{font-size:12px; color:var(--muted);}
    table{width:100%; border-collapse:collapse;}
    td{
      padding:12px 14px;
      border-bottom:1px solid rgba(36,40,56,.65);
      vertical-align:middle;
    }
    tr:last-child td{border-bottom:none;}
    .item{font-weight:650;}
    .price{text-align:right; font-variant-numeric: tabular-nums;}
    .badge{
      font-size:11px;
      color: rgba(11,12,16,.95);
      background: rgba(123,223,242,.9);
      padding:6px 10px;
      border-radius:999px;
      font-weight:700;
    }
    footer{padding:18px 16px 28px; color: var(--muted); text-align:center; font-size:12px;}
    .note{margin-top:8px; font-size:12px; color: rgba(185,192,204,.85);}
    .hidden{display:none !important;}
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="brand">
        <div class="brand-left">
          <div class="logo">Ç</div>
          <div>
            <h1>Çınar Cafe • Dijital Menü</h1>
            <div class="sub">Fiyatlar: 27.02.2026 çalışması</div>
          </div>
        </div>
        <div class="badge">QR Menü</div>
      </div>

      <div class="search">
        <input id="q" type="search" placeholder="Ürün ara (örn. latte, soda, limonata)..." autocomplete="off" />
      </div>

      <div id="chips" class="chips"></div>
      <div class="note">Not: Ekstralar (sos/şurup/süt) ürünlere isteğe göre eklenir.</div>
    </div>
  </header>

  <main class="wrap" id="content"></main>

  <footer>
    © Çınar Cafe • Mobil uyumlu menü • Google Sites linkinizi QR koda bağlayabilirsiniz.
  </footer>

<script>
const MENU = [{"title": "☕ Sıcak Kahveler", "key": "sıcak-kahveler", "items": [{"name": "Espresso", "price": 80}, {"name": "Double Espresso", "price": 85}, {"name": "Americano", "price": 100}, {"name": "Latte", "price": 110}, {"name": "Flat White", "price": 125}, {"name": "Cappuccino", "price": 110}, {"name": "Mocha", "price": 125}, {"name": "Caramel Mocha", "price": 125}, {"name": "White Mocha", "price": 125}, {"name": "Caramel Macchiato", "price": 120}, {"name": "Cookie Macchiato", "price": 120}, {"name": "Irishnut", "price": 120}, {"name": "Filtre Kahve", "price": 90}, {"name": "Türk Kahvesi", "price": 80}, {"name": "Dibek Kahvesi", "price": 80}, {"name": "Menengiç Kahvesi", "price": 80}]}, {"title": "🧊 Soğuk Kahveler", "key": "soğuk-kahveler", "items": [{"name": "Americano", "price": 100}, {"name": "Latte", "price": 110}, {"name": "Flat White", "price": 125}, {"name": "Mocha", "price": 125}, {"name": "Caramel Mocha", "price": 125}, {"name": "White Mocha", "price": 125}, {"name": "Caramel Macchiato", "price": 120}, {"name": "Cookie Macchiato", "price": 120}, {"name": "Irishnut", "price": 120}]}, {"title": "🥤 Milkshake", "key": "milkshake", "items": [{"name": "Vanilya", "price": 125}, {"name": "Karamel", "price": 125}, {"name": "Çikolata", "price": 125}, {"name": "Çilek", "price": 125}]}, {"title": "🍫 Sıcak İçecekler", "key": "sıcak-içecekler", "items": [{"name": "Sıcak Çikolata", "price": 110}, {"name": "Beyaz Çikolata", "price": 110}, {"name": "Salep", "price": 110}, {"name": "Bitki Çayı", "price": 75}, {"name": "Çay", "price": 45}]}, {"title": "🍹 Özel & Soğuk İçecekler", "key": "özel-soğuk-içecekler", "items": [{"name": "Cool Lime", "price": 125}, {"name": "Berry Lime", "price": 125}, {"name": "Churchill", "price": 100}, {"name": "Çınar Special", "price": 130}, {"name": "Vanilyalı Limonata", "price": 100}, {"name": "Karamelli Limonata", "price": 110}]}, {"title": "🥤 Soft Drink", "key": "soft-drink", "items": [{"name": "Sade Soda", "price": 45}, {"name": "Meyveli Soda", "price": 50}, {"name": "Su", "price": 15}, {"name": "Kola", "price": 50}]}, {"title": "➕ Ekstralar", "key": "ekstralar", "items": [{"name": "Sos", "price": 40}, {"name": "Şurup", "price": 30}, {"name": "Süt", "price": 30}]}];

function fmtTRY(n){ return `${n} ₺`; }

const content = document.getElementById('content');
const chipsBox = document.getElementById('chips');
const q = document.getElementById('q');

function render(){
  content.innerHTML = '';
  MENU.forEach(cat => {
    const section = document.createElement('section');
    section.dataset.key = cat.key;

    const head = document.createElement('div');
    head.className = 'sec-head';

    const h = document.createElement('h2');
    h.className = 'sec-title';
    h.textContent = cat.title;

    const c = document.createElement('div');
    c.className = 'count';
    c.textContent = `${cat.items.length} ürün`;

    head.appendChild(h);
    head.appendChild(c);

    const table = document.createElement('table');
    const tbody = document.createElement('tbody');

    cat.items.forEach(it => {
      const tr = document.createElement('tr');
      tr.dataset.text = (it.name + ' ' + cat.title).toLowerCase();

      const td1 = document.createElement('td');
      td1.className = 'item';
      td1.textContent = it.name;

      const td2 = document.createElement('td');
      td2.className = 'price';
      td2.textContent = fmtTRY(it.price);

      tr.appendChild(td1);
      tr.appendChild(td2);
      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    section.appendChild(head);
    section.appendChild(table);
    content.appendChild(section);
  });
}

function buildChips(){
  const all = [{key:'all', label:'Tümü'}].concat(
    MENU.map(c => ({key:c.key, label:c.title}))
  );

  chipsBox.innerHTML = '';
  all.forEach((ch, idx) => {
    const el = document.createElement('div');
    el.className = 'chip' + (idx===0 ? ' active' : '');
    el.textContent = ch.label;
    el.dataset.key = ch.key;
    el.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
      el.classList.add('active');
      applyFilters();
      if(ch.key !== 'all'){
        const target = document.querySelector(`section[data-key="${ch.key}"]`);
        if(target) target.scrollIntoView({behavior:'smooth', block:'start'});
      } else {
        window.scrollTo({top:0, behavior:'smooth'});
      }
    });
    chipsBox.appendChild(el);
  });
}

function applyFilters(){
  const term = (q.value || '').trim().toLowerCase();
  const activeChip = document.querySelector('.chip.active');
  const key = activeChip ? activeChip.dataset.key : 'all';

  document.querySelectorAll('section').forEach(sec => {
    const matchCat = (key === 'all') || (sec.dataset.key === key);
    let matchSearch = true;

    if(term){
      matchSearch = false;
      sec.querySelectorAll('tr').forEach(tr => {
        const ok = tr.dataset.text.includes(term);
        tr.classList.toggle('hidden', !ok);
        if(ok) matchSearch = true;
      });
    } else {
      sec.querySelectorAll('tr').forEach(tr => tr.classList.remove('hidden'));
    }
    sec.classList.toggle('hidden', !(matchCat && matchSearch));
  });
}

q.addEventListener('input', applyFilters);

render();
buildChips();
</script>
</body>
</html>
